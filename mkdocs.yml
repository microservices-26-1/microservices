site_name: Platforms, Microservices, DevOps and APIs
site_author: Ana Beatriz da Cunha, Gustavo Santana
site_description: Documentação do projeto de microservices - Insper 2026
site_url: https://microservices-26-1.github.io/microservices
repo_url: https://github.com/microservices-26-1/microservices
repo_name: microservices-26-1/microservices

theme:
  name: material
  language: pt-BR

  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Dark mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/microservices-26-1/microservices
      name: Repositório do projeto

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Projeto:
      - Arquitetura: arquitetura.md
      - Serviços: servicos.md
      - API: api.md
  - Operação:
      - Execução: execucao.md
      - Monitoramento: monitoramento.md
      - Custos: custos.md
  - Validação:
      - Testes: testes.md
      - Vídeos: videos.md
